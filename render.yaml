services:
  - type: web
    name: snaplink
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: BASE_URL
        sync: false
      - key: MONGO_URI
        sync: false
      - key: PORT
        value: 10000
